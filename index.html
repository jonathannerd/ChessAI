<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SixySeveny Chess AI</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <section class="boardPanel" aria-label="SixySeveny chess game">
      <div class="boardShell">
        <div class="boardFrame" aria-label="Chessboard with coordinates">
          <div id="topCoordinates" class="boardCoordinates fileCoordinates topCoordinates" aria-hidden="true"></div>
          <div id="leftCoordinates" class="boardCoordinates rankCoordinates leftCoordinates" aria-hidden="true"></div>
          <div id="chessboard" class="chessboard" aria-label="Chessboard"></div>
          <div id="rightCoordinates" class="boardCoordinates rankCoordinates rightCoordinates" aria-hidden="true"></div>
          <div id="bottomCoordinates" class="boardCoordinates fileCoordinates bottomCoordinates" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <aside class="sidePanel" aria-label="Game information">
      <header class="brandBlock">
        <p class="eyebrow">Browser chess AI</p>
        <h1>SixySeveny</h1>
        <p class="tagline">Search-based chess, built by hand.</p>
      </header>

      <section class="controlPanel" aria-label="Game controls">
        <fieldset class="controlGroup">
          <legend>Choose side</legend>
          <div class="segmentedControl" id="sideSelector">
            <button class="sideButton active" type="button" data-side="w">White</button>
            <button class="sideButton" type="button" data-side="b">Black</button>
          </div>
        </fieldset>

        <label class="controlGroup">
          <span>Difficulty</span>
          <select id="difficultySelect">
            <option value="easy">Easy - depth 1</option>
            <option value="medium" selected>Medium - depth 2</option>
            <option value="hard">Hard - depth 3</option>
            <option value="veryHard">Very Hard - depth 4</option>
          </select>
        </label>

        <button id="restartButton" class="primaryButton" type="button">Restart game</button>
      </section>

      <section class="statusPanel" aria-label="Current game status">
        <div class="statusItem">
          <span class="statusLabel">Current turn</span>
          <strong id="currentTurnText">White</strong>
        </div>
        <div class="statusItem">
          <span class="statusLabel">Game status</span>
          <strong id="statusText" aria-live="polite">White to move.</strong>
        </div>
        <div class="statusItem">
          <span class="statusLabel">Evaluation</span>
          <strong id="evaluationText">0.00</strong>
        </div>
      </section>

      <section class="movesPanel" aria-label="Move history">
        <div class="panelHeader">
          <h2>Move List</h2>
          <span id="moveCountText">0 moves</span>
        </div>
        <ol id="moveList" class="moveList"></ol>
      </section>
    </aside>
  </main>

  <div id="promotionDialog" class="promotionDialog hidden" role="dialog" aria-modal="true" aria-label="Choose promotion piece">
    <div class="promotionBox">
      <h2>Promote pawn</h2>
      <div id="promotionChoices" class="promotionChoices"></div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
